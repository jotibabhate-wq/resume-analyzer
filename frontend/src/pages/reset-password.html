<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - Resume Analyzer</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand">
            <div class="nav-brand-icon"><i class="fas fa-brain"></i></div>
            <span>Resume Analyzer</span>
        </div>
    </nav>

    <!-- Reset Password Page -->
    <div class="reset-page">
        <div class="reset-card">

            <!-- Icon -->
            <div class="reset-icon">
                <i class="fas fa-lock"></i>
            </div>

            <!-- Title -->
            <h1 id="resetTitle">Reset Your Password</h1>
            <p id="resetSubtitle">Enter your new password below</p>

            <!-- Form -->
            <div id="resetForm">
                <div class="form-group">
                    <label>New Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="newPassword" placeholder="Enter new password (min 6 chars)" />
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm your new password" />
                    </div>
                </div>
                <button class="btn-analyze" id="resetBtn">
                    <i class="fas fa-save"></i> Reset Password
                </button>
            </div>

            <!-- Success State -->
            <div id="resetSuccess" style="display:none">
                <div class="success-icon">✅</div>
                <h3>Password Reset Successfully!</h3>
                <p>You can now login with your new password.</p>
                <button class="btn-analyze" onclick="window.location.href='index.html'">
                    <i class="fas fa-sign-in-alt"></i> Go to Login
                </button>
            </div>

            <!-- Error State -->
            <div id="resetError" style="display:none">
                <div class="error-icon">❌</div>
                <h3>Link Expired or Invalid</h3>
                <p>This reset link has expired or is invalid. Please request a new one.</p>
                <button class="btn-analyze" onclick="window.location.href='index.html'">
                    <i class="fas fa-home"></i> Go Back Home
                </button>
            </div>

        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = window.location.hostname === 'localhost'
            ? 'http://localhost:5000/api'
            : 'https://resume-analyzer-7y62.onrender.com/api';

        // Get token and email from URL
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const email = params.get('email');

        if (!token || !email) {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('resetError').style.display = 'block';
        }

        // Show toast
        const showToast = (msg, type) => {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast ${type} show`;
            setTimeout(() => { toast.className = 'toast'; }, 3000);
        };

        // Reset password
        document.getElementById('resetBtn')?.addEventListener('click', async () => {
            const newPassword = document.getElementById('newPassword').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();

            if (!newPassword || !confirmPassword) {
                showToast('Please fill all fields', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            const btn = document.getElementById('resetBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/password/reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, email, password: newPassword })
                });

                const data = await res.json();

                if (data.success) {
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('resetSuccess').style.display = 'block';
                    document.getElementById('resetTitle').textContent = 'All Done!';
                    document.getElementById('resetSubtitle').textContent = '';
                } else {
                    showToast(data.message || 'Reset failed', 'error');
                    btn.innerHTML = '<i class="fas fa-save"></i> Reset Password';
                    btn.disabled = false;

                    if (data.message?.includes('expired') || data.message?.includes('Invalid')) {
                        document.getElementById('resetForm').style.display = 'none';
                        document.getElementById('resetError').style.display = 'block';
                    }
                }
            } catch (err) {
                showToast('Something went wrong', 'error');
                btn.innerHTML = '<i class="fas fa-save"></i> Reset Password';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
